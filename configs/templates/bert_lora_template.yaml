# configs/templates/bert_lora_template.yaml
exp_id: "bert_lora_template"
description: "BERT-LoRA分类基础模板"
base_config: null
task_type: "single_cls"

model:
  arch: "bert-base-chinese"
  path: "./models/bert-base-chinese"
  dropout: 0.15
  freeze_bert: False # 默认为 False
  lora:
    enabled: True
    rank: 8
    alpha: 16
    dropout: 0.05
    target_modules: ["query", "key", "value"]
    bias: "none"

data:
  train_path: "./data/raw/train_default.jsonl" # 统一命名
  dev_path: "./data/raw/dev_default.jsonl"
  data_format: "jsonl"
  max_len: 256
  data_process_version: "v1.0_default"
  text_col: "text"
  label_col:
    status: "label"
  label_subset:
    status: [0, 1]

train:
  num_epochs: 14
  batch_size: 20
  gradient_accumulation_steps: 3
  warmup_ratio: 0.1
  scheduler_type: "linear"
  optimizer:
    type: "AdamW"
    groups:
      bert: 2e-6
      lora: 1.5e-4
      classifier: 5e-4

resources:
  priority: "medium"
  gpus: "auto"
